  /api/invitations/bulk:
    post:
      tags:
        - Invitations
      summary: Send bulk invitations
      description: |
        Send invitations to multiple recipients.

        **Authorization:**
        - MANAGER+ required
        - Subject to bulk limits based on subscription

        **Process:**
        - Validates all emails
        - Creates invitations in batch
        - Queues emails for sending
        - Returns success/failure for each
