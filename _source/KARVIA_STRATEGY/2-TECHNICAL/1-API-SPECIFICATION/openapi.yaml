                    $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized - invalid or missing token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: User service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/logout:
    post:
      tags:
        - Authentication
      summary: User logout (proxy to IAM)
      description: |
        Logout the current user.
        Forwards request to IAM engine for session invalidation.
      operationId: logout
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '500':
          description: Logout service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/users:
    get:
      tags:
        - Authentication
      summary: Get business users
      description: |
        Get all active users for the authenticated user's company.

        **Authorization:**
        - Requires valid JWT token
        - Returns users scoped to user's business_id
        - Only returns active users
      operationId: getBusinessUsers
      responses:
        '200':
          description: Users retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
