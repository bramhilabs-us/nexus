      description: |
        Create a new custom assessment template.

        **Template Creation:**
        - Select questions from question bank
        - Set scoring weights
        - Define dimensions
        - Configure frequency

        **Authorization:**
        - MANAGER role or higher required
      operationId: createAssessmentTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - type
                - questions
              properties:
                name:
                  type: string
                  maxLength: 100
                  example: "Quarterly Performance Assessment"
                description:
                  type: string
                  maxLength: 500
                  example: "Standard quarterly assessment for all team members"
                type:
                  type: string
                  enum: [standard, quick, role_specific, custom]
                  example: "custom"
                questions:
                  type: array
                  items:
                    type: object
                    properties:
                      question_id:
                        type: string
                        format: objectId
                      category:
                        type: string
                        enum: [speed, strength, intelligence]
                      dimension:
                        type: string
                      weight:
                        type: number
                        default: 1
                frequency:
                  type: string
                  enum: [one_time, monthly, quarterly, annually]
                  default: quarterly
                roles:
                  type: array
                  items:
                    type: string
                    enum: [EMPLOYEE, MANAGER, EXECUTIVE]
                  description: "Roles this template applies to"
                is_active:
                  type: boolean
                  default: true
      responses:
        '201':
          description: Template created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Template created successfully"
                  template:
