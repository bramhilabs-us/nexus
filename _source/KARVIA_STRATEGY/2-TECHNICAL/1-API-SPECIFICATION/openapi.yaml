  # -----------------------------------------------------------
  # OKR CASCADE ENDPOINTS (6 endpoints)
  # Parent-child objective alignment and dependency management
  # -----------------------------------------------------------

  /api/objectives/{id}/cascade:
    post:
      tags:
        - OKR Cascade
      summary: Cascade objective to child entities
      description: |
        Create cascaded (child) objectives from a parent objective.

        **Cascade Logic:**
        - Parent objective distributes to teams/individuals
        - Child objectives inherit alignment and context
        - Progress rolls up to parent
        - Maintains bidirectional linkage

        **Cascade Options:**
        - Automatic weight distribution
        - Custom goal allocation
        - Timeline inheritance or customization
        - Notification to assignees

        **Use Cases:**
        - Company → Department → Team → Individual cascade
        - Strategic initiatives distributed across organization
        - Aligned goal setting
      operationId: cascadeObjective
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Parent objective ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - cascadeTargets
              properties:
                cascadeTargets:
                  type: array
                  items:
                    type: object
                    required:
                      - targetType
                      - targetId
                    properties:
                      targetType:
                        type: string
                        enum: [team, user, department]
                        description: Type of entity to cascade to
                      targetId:
                        type: string
                        format: uuid
                        description: ID of the target entity
                      weight:
                        type: number
                        minimum: 0
                        maximum: 100
                        description: Percentage contribution to parent (optional, auto-calculated if not provided)
                      customTitle:
                        type: string
                        description: Override objective title for this child
                      customDescription:
                        type: string
                        description: Override description for context
                      startDate:
                        type: string
                        format: date
                        description: Override start date (defaults to parent's)
                      endDate:
                        type: string
                        format: date
                        description: Override end date (defaults to parent's)
                distributionMode:
                  type: string
                  enum: [equal, weighted, custom]
                  default: equal
                  description: How to distribute progress contribution
                notifyAssignees:
                  type: boolean
                  default: true
                  description: Send notification to cascade targets
      responses:
        '201':
          description: Objectives cascaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Cascaded to 5 entities"
                  cascadedObjectives:
                    type: array
                    items:
                      $ref: '#/components/schemas/Objective'
                  cascadeMap:
                    $ref: '#/components/schemas/CascadeMap'
        '400':
          description: Invalid cascade configuration
        '404':
          description: Parent objective not found

  /api/objectives/{id}/cascade-tree:
    get:
      tags:
        - OKR Cascade
      summary: Get objective cascade tree
      description: |
        Get complete cascade hierarchy for an objective.

        **Tree Structure:**
        - Shows parent-child relationships
        - Multi-level depth support
        - Progress rollup visualization
        - Alignment health indicators

        **Data Includes:**
        - All descendant objectives
        - Progress at each level
        - Assignee information
        - Contribution weights
      operationId: getCascadeTree
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Objective ID (any level in hierarchy)
        - name: direction
          in: query
          schema:
            type: string
            enum: [up, down, both]
            default: down
          description: Navigation direction (up to parents, down to children, or both)
        - name: maxDepth
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 10
            default: 5
          description: Maximum depth to traverse
      responses:
        '200':
          description: Cascade tree retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CascadeTree'
        '404':
          description: Objective not found

  /api/objectives/{childId}/link-parent:
    post:
      tags:
        - OKR Cascade
      summary: Link objective to parent
      description: |
        Create parent-child relationship between objectives.

        **Link Types:**
        - Direct cascade relationship
        - Supporting objective relationship
        - Dependency linkage

        **Validation:**
        - Prevents circular dependencies
        - Checks cascade permissions
        - Validates timeline compatibility
      operationId: linkObjectiveToParent
      security:
        - bearerAuth: []
      parameters:
        - name: childId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Child objective ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - parentId
              properties:
                parentId:
                  type: string
                  format: uuid
                  description: Parent objective ID
                relationshipType:
                  type: string
                  enum: [cascaded, supporting, dependency]
                  default: cascaded
                weight:
                  type: number
                  minimum: 0
                  maximum: 100
                  description: Contribution to parent progress
      responses:
        '200':
          description: Objectives linked successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  relationship:
                    $ref: '#/components/schemas/ObjectiveRelationship'
        '400':
          description: Invalid linkage (circular dependency, etc.)
        '404':
          description: Objective not found

  /api/objectives/{childId}/unlink-parent:
    delete:
      tags:
        - OKR Cascade
      summary: Unlink objective from parent
      description: |
        Remove parent-child relationship between objectives.

        **Unlink Behavior:**
        - Breaks cascade connection
        - Retains objective data
        - Recalculates parent progress
        - Logs relationship history
      operationId: unlinkObjectiveFromParent
      security:
        - bearerAuth: []
      parameters:
        - name: childId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Child objective ID
      responses:
        '200':
          description: Objectives unlinked successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Objective unlinked from parent"
        '404':
          description: Objective or relationship not found

  /api/cascade/alignment-report:
    get:
      tags:
        - OKR Cascade
      summary: Get organizational alignment report
      description: |
        Generate comprehensive alignment report across the organization.

        **Report Includes:**
        - Cascade coverage (% of objectives cascaded)
        - Alignment score by department/team
        - Orphaned objectives (no parent linkage)
        - Top-level strategic alignment
        - Recommended cascade opportunities

        **Filters:**
        - By department, team, or time period
        - By objective status
        - By assignee
      operationId: getAlignmentReport
      security:
        - bearerAuth: []
      parameters:
        - name: companyId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
        - name: departmentId
          in: query
          schema:
            type: string
            format: uuid
        - name: includeRecommendations
          in: query
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: Alignment report generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlignmentReport'
        '403':
          description: Insufficient permissions

  /api/cascade/validate:
    post:
      tags:
        - OKR Cascade
      summary: Validate cascade configuration
      description: |
        Validate a proposed cascade before execution.

        **Validation Checks:**
        - Circular dependency detection
        - Timeline compatibility
        - Permission validation
        - Weight/contribution math
        - Capacity checks (assignee workload)

        **Returns:**
        - Validation status
        - List of errors/warnings
        - Suggested fixes
      operationId: validateCascade
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - parentId
                - cascadeTargets
              properties:
                parentId:
                  type: string
                  format: uuid
                cascadeTargets:
                  type: array
                  items:
                    type: object
                    properties:
                      targetType:
                        type: string
                        enum: [team, user, department]
                      targetId:
                        type: string
                        format: uuid
                      weight:
                        type: number
      responses:
        '200':
          description: Validation completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CascadeValidation'

  # -----------------------------------------------------------
  # UTILITY ENDPOINTS (5 endpoints)
  # File uploads, notifications, and search functionality
  # -----------------------------------------------------------

  /api/files/upload:
    post:
      tags:
        - Utilities
      summary: Upload file
      description: |
        Upload file attachments for objectives, tasks, or assessments.

        **Supported File Types:**
        - Documents: PDF, DOCX, XLSX, PPTX
        - Images: JPG, PNG, GIF, SVG
        - Other: CSV, TXT, MD

        **File Constraints:**
        - Maximum size: 10MB per file
        - Virus scanning on upload
        - Automatic thumbnail generation for images

        **Use Cases:**
        - Objective documentation
        - Task attachments
        - Assessment evidence
        - Profile pictures
      operationId: uploadFile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - context
              properties:
                file:
                  type: string
                  format: binary
                  description: File to upload
                context:
                  type: string
                  enum: [objective, task, assessment, profile, general]
                  description: Usage context for the file
                entityId:
                  type: string
                  format: uuid
                  description: ID of entity this file belongs to (optional)
                description:
                  type: string
                  description: File description
      responses:
        '201':
          description: File uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUpload'
        '400':
          description: Invalid file or size exceeded
        '413':
          description: File too large

  /api/files/{id}:
    get:
      tags:
        - Utilities
      summary: Get file details
      description: Get metadata and download URL for uploaded file
      operationId: getFile
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: File details retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUpload'
        '404':
          description: File not found

    delete:
      tags:
        - Utilities
      summary: Delete file
      description: Delete uploaded file
      operationId: deleteFile
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: File deleted successfully
        '404':
          description: File not found

  /api/notifications:
    get:
      tags:
        - Utilities
      summary: Get user notifications
      description: |
        Get paginated list of notifications for the authenticated user.

        **Notification Types:**
        - Objective updates
        - Task assignments
        - Assessment completions
        - Team invitations
        - Cascade notifications
        - System announcements
      operationId: getNotifications
      security:
        - bearerAuth: []
      parameters:
        - name: unreadOnly
          in: query
          schema:
            type: boolean
            default: false
        - name: type
          in: query
          schema:
            type: string
            enum: [objective, task, assessment, invitation, cascade, system]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Notifications retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Notification'
                  pagination:
                    $ref: '#/components/schemas/PaginationInfo'
                  unreadCount:
                    type: integer
                    example: 5

  /api/notifications/{id}/read:
    patch:
      tags:
        - Utilities
      summary: Mark notification as read
      description: Mark a specific notification as read
      operationId: markNotificationRead
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Notification marked as read
        '404':
          description: Notification not found

  /api/notifications/read-all:
    patch:
      tags:
        - Utilities
      summary: Mark all notifications as read
      description: Mark all user notifications as read
      operationId: markAllNotificationsRead
      security:
        - bearerAuth: []
      responses:
        '200':
          description: All notifications marked as read
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  markedCount:
                    type: integer
                    example: 12

  /api/search:
    get:
      tags:
        - Utilities
      summary: Global search
      description: |
        Search across objectives, goals, tasks, and users.

        **Search Features:**
        - Full-text search
        - Fuzzy matching
        - Entity type filtering
        - Permission-aware results
        - Relevance scoring

        **Searchable Fields:**
        - Objective/goal/task titles and descriptions
        - User names and emails
        - Team names
        - Tags and categories
      operationId: globalSearch
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
          description: Search query
        - name: types
          in: query
          schema:
            type: array
            items:
              type: string
              enum:
                - objective
                - goal
                - task
                - user
                - team
          description: "Entity types to search (default: all)"
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
            maximum: 50
      responses:
        '200':
          description: Search results retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResults'