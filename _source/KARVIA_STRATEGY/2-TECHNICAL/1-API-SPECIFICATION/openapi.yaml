# ==================== OBJECTIVES ENDPOINTS ====================
  /api/objectives:
    get:
      tags:
        - Objectives
      summary: List objectives
      description: |
        List objectives with flexible filtering options.

        **Filtering:**
        - By owner (user, team, company)
        - By time period (quarter, year)
        - By status (active, completed, at_risk)
        - By hierarchy level (company, team, individual)

        **Authorization:**
        - Users see objectives based on their role and hierarchy
        - Managers see team + individual objectives
        - Executives see all company objectives
      operationId: listObjectives
      parameters:
        - name: owner_type
          in: query
          schema:
            type: string
            enum: [company, team, individual]
          description: Filter by owner type
        - name: owner_id
          in: query
          schema:
            type: string
            format: objectId
          description: Filter by specific owner ID
        - name: period
          in: query
          schema:
            type: string
            enum: [Q1, Q2, Q3, Q4, yearly, all]
            default: current
          description: Time period filter
        - name: year
          in: query
          schema:
            type: integer
            minimum: 2020
            maximum: 2030
          description: Year filter
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, active, completed, at_risk, on_track]
          description: Status filter
        - name: include_key_results
          in: query
          schema:
            type: boolean
            default: false
          description: Include key results in response
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Items per page
      responses:
        '200':
          description: Objectives retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      objectives:
                        type: array
                        items:
                          $ref: '#/components/schemas/Objective'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Objectives
      summary: Create objective
      description: |
        Create a new OKR objective.

        **Authorization:**
        - Role-based creation permissions
        - Executives: Company-level objectives
        - Managers: Team-level objectives
        - All: Individual objectives (for self)

        **Cascading:**
        - Can link to parent objective for cascading
        - Inherits alignment from parent
      operationId: createObjective
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - owner_type
              properties:
                title:
                  type: string
                  maxLength: 200
                  example: "Increase customer satisfaction"
                description:
                  type: string
                  maxLength: 1000
                  example: "Improve NPS score through better customer support"
                owner_type:
                  type: string
                  enum: [company, team, individual]
                  example: "team"
                owner_id:
                  type: string
                  format: objectId
                  description: "ID of the owner (team_id, user_id, or company_id)"
                parent_objective_id:
                  type: string
                  format: objectId
                  description: "Parent objective for cascading"
                period:
                  type: string
                  enum: [Q1, Q2, Q3, Q4, yearly]
                  example: "Q1"
                year:
                  type: integer
                  example: 2025
                key_results:
                  type: array
                  items:
                    $ref: '#/components/schemas/KeyResultInput'
                tags:
                  type: array
                  items:
                    type: string
                  example: ["customer-success", "priority-1"]
                target_completion_date:
                  type: string
                  format: date
                  example: "2025-03-31"
      responses:
        '201':
          description: Objective created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Objective created successfully"
                  objective:
                    $ref: '#/components/schemas/Objective'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

