        '404':
          description: Objective not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Objectives
      summary: Delete objective
      description: |
        Delete an objective and optionally its child objectives.

        **Authorization:**
        - Same as update permissions

        **Cascade Options:**
        - Delete child objectives
        - Orphan child objectives (remove parent link)
        - Prevent deletion if children exist
      operationId: deleteObjective
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: objectId
          description: Objective ID
        - name: cascade
          in: query
          schema:
            type: string
            enum: [delete, orphan, prevent]
            default: prevent
          description: How to handle child objectives
      responses:
        '200':
          description: Objective deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Objective deleted successfully"
                  deleted_count:
                    type: integer
                    description: Number of objectives deleted (including children if cascaded)
                    example: 1
        '400':
          description: Cannot delete - has child objectives
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Objective not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
