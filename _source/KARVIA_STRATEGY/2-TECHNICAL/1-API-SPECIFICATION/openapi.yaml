          application/json:
            schema:
              type: object
              required:
                - template_id
              properties:
                template_id:
                  type: string
                  format: objectId
                  description: "Assessment template to use"
                participant_id:
                  type: string
                  format: objectId
                  description: "User taking assessment (defaults to current user)"
                context:
                  type: object
                  properties:
                    role:
                      type: string
                    department:
                      type: string
                    team_id:
                      type: string
                      format: objectId
      responses:
        '201':
          description: Assessment started successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Assessment started"
                  assessment:
                    $ref: '#/components/schemas/Assessment'
                  questions:
                    type: array
                    items:
                      $ref: '#/components/schemas/AssessmentQuestion'
