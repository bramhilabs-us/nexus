        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

# ==================== COMPANIES ENDPOINTS ====================
  /api/companies:
    get:
      tags:
        - Companies
      summary: List companies
      description: |
        List companies based on user role:
        - **CONSULTANT**: See all companies they manage (via managed_companies array)
        - **Other roles**: See only their own company

        Results can be filtered by status, industry, size_category, and subscription_tier.

        **Note:** Sensitive fields (custom_domain, settings) are excluded from list view.
      operationId: listCompanies
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, trial, suspended]
          description: Filter by company status
        - name: industry
          in: query
          schema:
            type: string
            enum: [consulting, marketing, it_services, professional_services, healthcare, other]
          description: Filter by industry
        - name: size_category
          in: query
          schema:
            type: string
            enum: [small, medium, large]
          description: Filter by company size
        - name: subscription_tier
          in: query
          schema:
            type: string
            enum: [starter, professional, enterprise]
          description: Filter by subscription tier
      responses:
        '200':
          description: Companies retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  count:
                    type: integer
                    example: 5
                  companies:
                    type: array
                    items:
                      $ref: '#/components/schemas/Company'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Companies
      summary: Create new company
      description: |
        Create a new company record.

        **Authorization:**
        - **CONSULTANT role only**
        - Company is automatically added to consultant's managed_companies array
        - New company starts in 'trial' status with trial_started_at set to current time
      operationId: createCompany
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - employee_count
              properties:
                name:
                  type: string
                  maxLength: 255
                  example: "New Corp"
                industry:
                  type: string
                  enum: [consulting, marketing, it_services, professional_services, healthcare, other]
                  default: other
                size_category:
                  type: string
                  enum: [small, medium, large]
                  default: medium
                employee_count:
                  type: integer
                  minimum: 1
                  maximum: 500
                website:
                  type: string
                  format: uri
                subscription_tier:
                  type: string
                  enum: [starter, professional, enterprise]
                  default: professional
                ibrain_enabled:
                  type: boolean
                  default: false
      responses:
        '201':
          description: Company created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Company created successfully"
                  company:
                    $ref: '#/components/schemas/CompanySummary'
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                message: "Company name and employee count are required"
        '403':
          description: Insufficient permissions (not a CONSULTANT)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/companies/{id}:
    get:
      tags:
        - Companies
      summary: Get company by ID
      description: |
        Retrieve detailed company information.

        **Authorization:**
        - **CONSULTANT**: Must manage this company (company_id in managed_companies)
        - **Other roles**: Can only view their own company (company_id matches user's company_id)

        Response includes computed fields:
        - health_score: Average of SSI scores
        - size_description: Human-readable size category
        - subscription_status: Current subscription status (handles trial expiration)
        - assessment_due: Whether assessment is due (3+ months since last)
      operationId: getCompanyById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: objectId
          description: Company ID
      responses:
        '200':
          description: Company retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  company:
                    $ref: '#/components/schemas/Company'
        '403':
          description: Forbidden - not authorized to view this company
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                consultant:
                  summary: Consultant doesn't manage company
                  value:
                    success: false
                    message: "You do not manage this company"
                other:
                  summary: User can only view own company
                  value:
                    success: false
                    message: "You can only view your own company"
        '404':
          description: Company not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                message: "Company not found"
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Companies
      summary: Update company
      description: |
        Update company details.

        **Authorization:**
        - **CONSULTANT**: Can update companies they manage
        - **BUSINESS_OWNER**: Can update their own company
        - **Other roles**: No access

        **Branding Updates:**
        - CONSULTANT and BUSINESS_OWNER can update branding
        - Allows white-label customization
      operationId: updateCompany
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: objectId
          description: Company ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 255
                industry:
                  type: string
                  enum: [consulting, marketing, it_services, professional_services, healthcare, other]
                size_category:
                  type: string
                  enum: [small, medium, large]
                employee_count:
                  type: integer
                  minimum: 1
                  maximum: 500
                website:
                  type: string
                  format: uri
                subscription_tier:
                  type: string
                  enum: [starter, professional, enterprise]
                ibrain_enabled:
                  type: boolean
                branding:
                  $ref: '#/components/schemas/CompanyBranding'
                settings:
                  $ref: '#/components/schemas/CompanySettings'
      responses:
        '200':
          description: Company updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Company updated successfully"
                  company:
                    type: object
                    properties:
                      _id:
                        type: string
                      name:
                        type: string
                      industry:
                        type: string
                      employee_count:
                        type: integer
                      updated_at:
                        type: string
                        format: date-time
        '403':
          description: Forbidden - not authorized to update this company
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Company not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Companies
      summary: Delete/deactivate company
      description: |
        Delete or deactivate a company.

        **Authorization:**
        - **CONSULTANT role only**
        - Must manage this company

        **Deletion Types:**
        - **Soft delete (default)**: Sets status to 'suspended', preserves data
        - **Hard delete**: Permanently removes company (use ?permanent=true)
          - WARNING: Should cascade delete all related resources (users, teams, objectives, etc.)
      operationId: deleteCompany
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: objectId
          description: Company ID
        - name: permanent
          in: query
          schema:
            type: boolean
            default: false
          description: If true, permanently delete. Otherwise soft delete (suspend).
      responses:
        '200':
          description: Company deleted/deactivated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Company deactivated"
              examples:
                softDelete:
                  summary: Soft delete (suspended)
                  value:
                    success: true
                    message: "Company deactivated"
                hardDelete:
                  summary: Hard delete (permanent)
                  value:
                    success: true
                    message: "Company permanently deleted"
        '403':
          description: Forbidden - not authorized or not a CONSULTANT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                message: "You do not manage this company"
        '404':
          description: Company not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/companies/{id}/stats:
    get:
      tags:
        - Companies
      summary: Get company statistics
      description: |
        Retrieve comprehensive company statistics including:
        - User counts (total active users vs target employee_count)
        - Team count (active teams)
        - Objective count
        - Goal count
        - Assessment scores (SSI)
        - Onboarding progress
        - Subscription information

        **Authorization:**
        - **CONSULTANT**: Must manage this company
        - **Other roles**: Can only view stats for their own company
      operationId: getCompanyStats
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: objectId
          description: Company ID
      responses:
        '200':
          description: Statistics retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  stats:
                    $ref: '#/components/schemas/CompanyStats'
        '403':
          description: Unauthorized access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                message: "Unauthorized access"
        '404':
          description: Company not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/companies/{id}/assessment-scores:
    put:
      tags:
        - Companies
      summary: Update company assessment scores
      description: |
        Update the company's SSI assessment scores (Speed, Strength, Intelligence).

        **Behavior:**
        - Updates individual scores (speed, strength, intelligence)
        - Automatically calculates overall_score as average of three scores
        - Sets last_assessed to current timestamp
        - Optionally updates readiness_profile

        **Authorization:**
        - Requires authentication
        - Authorization depends on user role and company relationship
      operationId: updateAssessmentScores
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: objectId
          description: Company ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                speed_score:
                  type: number
                  minimum: 0
                  maximum: 100
                strength_score:
                  type: number
                  minimum: 0
                  maximum: 100
                intelligence_score:
                  type: number
                  minimum: 0
                  maximum: 100
                readiness_profile:
                  type: string
                  enum: [getting_started, developing, advanced, optimized]
              example:
                speed_score: 75
                strength_score: 80
                intelligence_score: 70
                readiness_profile: "developing"
      responses:
        '200':
          description: Assessment scores updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Assessment scores updated"
                  assessment_scores:
                    $ref: '#/components/schemas/AssessmentScores'
        '404':
          description: Company not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/companies/{id}/onboarding:
    put:
      tags:
        - Companies
      summary: Update company onboarding progress
      description: |
        Update onboarding progress for a company.

        **Steps:**
        - assessment_completed
        - team_setup_completed
        - first_objective_created
        - first_goals_assigned

        **Behavior:**
        - Updates specified step to completed (or value of 'completed' parameter)
        - Checks if all steps are complete
        - If all complete, sets onboarding_completed = true

        **Authorization:**
        - Requires authentication
        - Should be accessible by company users
      operationId: updateOnboardingProgress
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: objectId
          description: Company ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - step
              properties:
                step:
                  type: string
                  enum: [assessment_completed, team_setup_completed, first_objective_created, first_goals_assigned]
                  example: "assessment_completed"
                completed:
                  type: boolean
                  default: true
                  example: true
      responses:
        '200':
          description: Onboarding progress updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Onboarding progress updated"
                  onboarding_progress:
                    $ref: '#/components/schemas/CompanyOnboardingProgress'
                  onboarding_completed:
                    type: boolean
                    example: false
        '404':
          description: Company not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

# ==================== PART 2: TEAMS + OBJECTIVES + GOALS ====================
# This section includes comprehensive endpoints for team management,
# OKR objectives with cascading support, and goal management functionality

# ==================== TEAMS ENDPOINTS ====================
  /api/teams:
    get:
      tags:
        - Teams
      summary: List teams
      description: |
        List all teams in the authenticated user's company.

        **Authorization:**
        - Returns teams scoped to user's company_id
        - Managers can see all teams
        - Employees see only their own team(s)

        **Includes:**
        - Team member count
        - Active objectives count
        - Team lead information
      operationId: listTeams
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, archived]
            default: active
          description: Filter by team status
        - name: department_id
          in: query
          schema:
            type: string
            format: objectId
          description: Filter by department
        - name: include_members
          in: query
          schema:
            type: boolean
            default: false
          description: Include full member details
      responses:
        '200':
          description: Teams retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  count:
                    type: integer
                    example: 8
                  teams:
                    type: array
                    items:
                      $ref: '#/components/schemas/Team'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Teams
      summary: Create team
      description: |
        Create a new team within the company.

        **Authorization:**
        - Requires MANAGER role or higher
        - Automatically scoped to user's company_id
        - Team lead must be an existing user in the company
      operationId: createTeam
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  maxLength: 100
                  example: "Marketing Team"
                description:
                  type: string
                  maxLength: 500
                  example: "Digital marketing and brand management"
                team_lead_id:
                  type: string
                  format: objectId
                  description: User ID of the team lead
                department_id:
                  type: string
                  format: objectId
                  description: Department this team belongs to
                member_ids:
                  type: array
                  items:
                    type: string
                    format: objectId
                  description: Initial team members
      responses:
        '201':
          description: Team created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Team created successfully"
                  team:
                    $ref: '#/components/schemas/Team'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/teams/{id}:
    get:
      tags:
        - Teams
      summary: Get team details
      description: |
        Retrieve detailed information about a specific team.

        **Includes:**
        - Full member list with user details
        - Active objectives
        - Performance metrics
        - Team hierarchy information
      operationId: getTeamById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: objectId
          description: Team ID
        - name: include_objectives
          in: query
          schema:
            type: boolean
            default: false
          description: Include team's active objectives
      responses:
        '200':
          description: Team retrieved successfully
