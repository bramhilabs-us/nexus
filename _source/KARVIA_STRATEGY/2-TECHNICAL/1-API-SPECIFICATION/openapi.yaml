# ==================== AI OKR GENERATION ENDPOINTS ====================
  /api/ai-okr/generate/{assessmentId}:
    post:
      tags:
        - AI OKR
      summary: Generate OKRs from assessment
      description: |
        Generate AI-powered OKR suggestions based on assessment results.

        **Generation Process:**
        1. Analyze assessment scores
        2. Identify improvement areas
        3. Generate relevant objectives
        4. Create measurable key results
        5. Prioritize suggestions

        **Authorization:**
        - User must have access to assessment
        - AI features must be enabled
      operationId: generateAIObjectives
      parameters:
        - name: assessmentId
          in: path
          required: true
          schema:
            type: string
            format: objectId
          description: Assessment ID
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                count:
                  type: integer
                  minimum: 1
                  maximum: 10
                  default: 5
                  description: "Number of objectives to generate"
                focus_areas:
                  type: array
                  items:
                    type: string
                    enum: [speed, strength, intelligence]
                  description: "Specific areas to focus on"
                time_horizon:
                  type: string
                  enum: [quarterly, annual]
                  default: quarterly
                aggressiveness:
                  type: string
                  enum: [conservative, moderate, aggressive]
                  default: moderate
                  description: "How ambitious the goals should be"
      responses:
        '200':
          description: OKRs generated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "OKRs generated successfully"
                  suggestions:
                    type: array
                    items:
                      $ref: '#/components/schemas/AIOKRSuggestion'
        '403':
          description: AI features not enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Assessment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

