        - name: template_id
          in: query
          schema:
            type: string
            format: objectId
          description: Filter by template
        - name: participant_id
          in: query
          schema:
            type: string
            format: objectId
          description: Filter by participant
        - name: date_from
          in: query
          schema:
            type: string
            format: date
          description: Filter assessments created after date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
          description: Filter assessments created before date
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
