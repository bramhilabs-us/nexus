                  type: array
                  minItems: 1
                  maxItems: 100
                  items:
                    type: object
                    required:
                      - email
                      - role
                    properties:
                      email:
                        type: string
                        format: email
                      first_name:
                        type: string
                      last_name:
                        type: string
                      role:
                        type: string
                        enum: [EMPLOYEE, MANAGER, EXECUTIVE]
                      team_id:
                        type: string
                        format: objectId
                      department:
                        type: string
                common_message:
                  type: string
                  maxLength: 500
                  description: "Message to include in all invitations"
                expires_in_days:
                  type: integer
                  minimum: 1
                  maximum: 30
                  default: 7
      responses:
