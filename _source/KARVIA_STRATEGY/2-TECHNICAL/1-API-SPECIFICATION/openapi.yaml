          description: Bulk invitations processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Bulk invitations processed"
                  results:
                    type: object
                    properties:
                      successful:
                        type: integer
                        example: 18
                      failed:
                        type: integer
                        example: 2
                      details:
                        type: array
