  /api/invitations:
    get:
      tags:
        - Invitations
      summary: List invitations
      description: |
        List all invitations for the company.

        **Authorization:**
        - MANAGER+ can view all invitations
        - Users can view invitations they sent

        **Includes:**
        - Invitation status (pending, accepted, expired, cancelled)
        - Invitee information
        - Email tracking data
      operationId: listInvitations
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, accepted, expired, cancelled]
          description: Filter by invitation status
        - name: role
          in: query
          schema:
            type: string
            enum: [EMPLOYEE, MANAGER, EXECUTIVE]
          description: Filter by invited role
        - name: sent_by
          in: query
          schema:
            type: string
            format: objectId
          description: Filter by sender
        - name: date_from
          in: query
          schema:
            type: string
            format: date
          description: Filter invitations sent after date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
          description: Filter invitations sent before date
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Invitations retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      invitations:
                        type: array
                        items:
                          $ref: '#/components/schemas/Invitation'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Invitations
      summary: Create invitation
      description: |
        Create a new invitation to join the company.

        **Process:**
        1. Create invitation record
        2. Generate unique token
        3. Send invitation email
        4. Track email status

        **Authorization:**
        - MANAGER+ can send invitations
        - Invitation limits may apply based on subscription
      operationId: createInvitation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - role
              properties:
                email:
                  type: string
                  format: email
                  example: "john.doe@example.com"
                first_name:
                  type: string
                  maxLength: 50
                  example: "John"
                last_name:
                  type: string
                  maxLength: 50
                  example: "Doe"
                role:
                  type: string
                  enum: [EMPLOYEE, MANAGER, EXECUTIVE]
                  example: "EMPLOYEE"
                team_id:
                  type: string
                  format: objectId
                  description: "Pre-assign to team"
                department:
                  type: string
                  example: "Engineering"
                custom_message:
                  type: string
                  maxLength: 500
                  example: "Welcome to our team! We're excited to have you join us."
                expires_in_days:
                  type: integer
                  minimum: 1
                  maximum: 30
                  default: 7
                include_assessment:
                  type: boolean
                  default: false
                  description: "Include initial assessment in onboarding"
      responses:
        '201':
          description: Invitation created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
