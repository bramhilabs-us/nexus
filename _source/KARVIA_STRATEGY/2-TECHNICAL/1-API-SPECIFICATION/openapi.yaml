  /api/assessments/{id}/submit-responses:
    post:
      tags:
        - Assessments
      summary: Submit assessment responses
      description: |
        Submit responses for an in-progress assessment.

        **Submission Options:**
        - Submit all responses at once
        - Submit partial responses (auto-save)
        - Override previous responses

        **Validation:**
        - All required questions must be answered for completion
        - Response values must be within valid range (1-5 for Likert)
      operationId: submitAssessmentResponses
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: objectId
          description: Assessment ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - responses
              properties:
                responses:
                  type: array
                  items:
                    type: object
                    required:
                      - question_id
                      - value
                    properties:
                      question_id:
                        type: string
                        format: objectId
                      value:
                        type: integer
                        minimum: 1
                        maximum: 5
                        description: "Likert scale response"
                      text_response:
                        type: string
                        maxLength: 1000
                        description: "Optional text elaboration"
                is_final:
                  type: boolean
                  default: false
                  description: "Mark assessment as completed"
      responses:
        '200':
          description: Responses submitted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Responses submitted"
                  assessment:
                    $ref: '#/components/schemas/Assessment'
                  progress:
                    type: object
                    properties:
                      answered:
                        type: integer
                        example: 45
                      total:
                        type: integer
                        example: 50
                      percentage:
                        type: number
                        example: 90
        '400':
          description: Invalid responses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Assessment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

