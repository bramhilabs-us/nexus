# KARVIA PRO API SPECIFICATION - PART 2 ONLY
# Teams, Objectives, and Goals Management
# This file contains only Part 2 additions to be merged with the main spec

# ==================== OBJECTIVE & GOAL SCHEMAS (Add to components/schemas) ====================

    # ==================== OBJECTIVE SCHEMAS ====================
    Objective:
      type: object
      required:
        - _id
        - title
        - owner_type
        - owner_id
        - company_id
      properties:
        _id:
          type: string
          format: objectId
          example: "507f1f77bcf86cd799439014"
        title:
          type: string
          maxLength: 200
          example: "Increase customer satisfaction to 90%"
        description:
          type: string
          maxLength: 1000
          example: "Improve customer satisfaction through better support and product quality"
        owner_type:
          type: string
          enum: [company, team, individual]
          example: "team"
        owner_id:
          type: string
          format: objectId
          description: "ID of the owner (company_id, team_id, or user_id)"
        company_id:
          type: string
          format: objectId
        parent_objective_id:
          type: string
          format: objectId
          description: "Parent objective for cascading"
        period:
          type: string
          enum: [Q1, Q2, Q3, Q4, yearly]
          example: "Q1"
        year:
          type: integer
          example: 2025
        status:
          type: string
          enum: [draft, active, completed, at_risk, on_track]
          default: draft
        progress_percentage:
          type: number
          minimum: 0
          maximum: 100
          example: 65
        key_results:
          type: array
          items:
            $ref: '#/components/schemas/KeyResult'
        tags:
          type: array
          items:
            type: string
          example: ["customer-success", "priority-1"]
        target_completion_date:
          type: string
          format: date
        actual_completion_date:
          type: string
          format: date
        created_by:
          type: string
          format: objectId
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ObjectiveDetail:
      allOf:
        - $ref: '#/components/schemas/Objective'
        - type: object
          properties:
            owner_details:
              oneOf:
                - $ref: '#/components/schemas/CompanySummary'
                - $ref: '#/components/schemas/Team'
                - $ref: '#/components/schemas/UserSummary'
            child_objectives:
              type: array
              items:
                $ref: '#/components/schemas/ObjectiveSummary'
            linked_goals:
              type: array
              items:
                $ref: '#/components/schemas/GoalSummary'
            activity_log:
              type: array
              items:
                $ref: '#/components/schemas/ActivityLogEntry'

    ObjectiveSummary:
      type: object
      required:
        - _id
        - title
        - owner_type
        - progress_percentage
      properties:
        _id:
          type: string
          format: objectId
        title:
          type: string
        owner_type:
          type: string
          enum: [company, team, individual]
        progress_percentage:
          type: number
        status:
          type: string
          enum: [draft, active, completed, at_risk, on_track]
        period:
          type: string
          enum: [Q1, Q2, Q3, Q4, yearly]

    ObjectiveSuggestion:
      type: object
      properties:
        title:
          type: string
          example: "Improve team productivity by 25%"
        description:
          type: string
          example: "Enhance team efficiency through process improvements and automation"
        rationale:
          type: string
          example: "Based on current team velocity and industry benchmarks"
        suggested_key_results:
          type: array
          items:
            type: object
            properties:
              title:
                type: string
                example: "Reduce average task completion time from 3 days to 2 days"
              metric_type:
                type: string
                enum: [percentage, number, currency, boolean]
              target_value:
                type: number
        priority_score:
          type: number
          minimum: 0
          maximum: 100
          example: 85
        confidence_level:
          type: string
          enum: [low, medium, high]
          example: "high"

    KeyResult:
      type: object
      required:
        - _id
        - title
        - metric_type
        - target_value
        - current_value
      properties:
        _id:
          type: string
          format: objectId
          example: "507f1f77bcf86cd799439015"
        title:
          type: string
          maxLength: 200
          example: "Achieve NPS score of 70"
        metric_type:
          type: string
          enum: [percentage, number, currency, boolean]
          example: "number"
        start_value:
          type: number
          example: 45
        current_value:
          type: number
          example: 58
        target_value:
          type: number
          example: 70
        progress_percentage:
          type: number
          readOnly: true
          minimum: 0
          maximum: 100
          example: 65
        unit:
          type: string
          example: "NPS points"
        status:
          type: string
          enum: [not_started, in_progress, at_risk, on_track, completed]
          default: not_started
        owner_id:
          type: string
          format: objectId
          description: "User responsible for this key result"
        due_date:
          type: string
          format: date
        last_update:
          type: string
          format: date-time
        comments:
          type: array
          items:
            $ref: '#/components/schemas/Comment'

    KeyResultInput:
      type: object
      required:
        - title
        - metric_type
        - target_value
      properties:
        title:
          type: string
          maxLength: 200
        metric_type:
          type: string
          enum: [percentage, number, currency, boolean]
        start_value:
          type: number
          default: 0
        target_value:
          type: number
        unit:
          type: string
        owner_id:
          type: string
          format: objectId
        due_date:
          type: string
          format: date

    UserDashboard:
      type: object
      properties:
        user_objectives:
          type: array
          items:
            $ref: '#/components/schemas/Objective'
        team_objectives:
          type: array
          items:
            $ref: '#/components/schemas/Objective'
        upcoming_deadlines:
          type: array
          items:
            type: object
            properties:
              item_type:
                type: string
                enum: [objective, key_result, goal]
              item_id:
                type: string
                format: objectId
              title:
                type: string
              due_date:
                type: string
                format: date
              days_remaining:
                type: integer
        at_risk_items:
          type: array
          items:
            type: object
            properties:
              item_type:
                type: string
                enum: [objective, key_result, goal]
              item_id:
                type: string
                format: objectId
              title:
                type: string
              risk_level:
                type: string
                enum: [low, medium, high]
              reason:
                type: string
        recent_activity:
          type: array
          items:
            $ref: '#/components/schemas/ActivityLogEntry'
        summary_stats:
          type: object
          properties:
            total_objectives:
              type: integer
            objectives_on_track:
              type: integer
            objectives_at_risk:
              type: integer
            average_progress:
              type: number
            goals_this_week:
              type: integer
            tasks_completed_today:
              type: integer

    IBrainPriorityAnalysis:
      type: object
      properties:
        analyzed_at:
          type: string
          format: date-time
        priorities:
          type: array
          items:
            type: object
            properties:
              objective_id:
                type: string
                format: objectId
              title:
                type: string
              priority_score:
                type: number
                minimum: 0
                maximum: 100
              impact_score:
                type: number
                minimum: 0
                maximum: 100
              urgency_score:
                type: number
                minimum: 0
                maximum: 100
              recommended_focus_percentage:
                type: number
                minimum: 0
                maximum: 100
                description: "Percentage of time to allocate"
        recommended_actions:
          type: array
          items:
            type: string
        focus_areas:
          type: array
          items:
            type: object
            properties:
              area:
                type: string
              priority:
                type: string
                enum: [critical, high, medium, low]
              reason:
                type: string

    IBrainInsights:
      type: object
      properties:
        generated_at:
          type: string
          format: date-time
        performance_trends:
          type: object
          properties:
            trend_direction:
              type: string
              enum: [improving, stable, declining]
            velocity:
              type: number
            projected_completion:
              type: string
              format: date
        bottlenecks:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum: [resource, process, dependency, skill]
              description:
                type: string
              impact_level:
                type: string
                enum: [low, medium, high]
              suggested_resolution:
                type: string
        success_patterns:
          type: array
          items:
            type: object
            properties:
              pattern:
                type: string
              frequency:
                type: integer
              impact:
                type: string
        recommendations:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum: [action, resource, timeline, strategy]
              priority:
                type: string
                enum: [urgent, high, medium, low]
              recommendation:
                type: string
              expected_impact:
                type: string
        predictive_analytics:
          type: object
          properties:
            success_probability:
              type: number
              minimum: 0
              maximum: 100
            risk_factors:
              type: array
              items:
                type: string
            opportunities:
              type: array
              items:
                type: string

    AIHelpRecommendations:
      type: object
      properties:
        analysis:
          type: object
          properties:
            root_causes:
              type: array
              items:
                type: string
            impact_assessment:
              type: string
            risk_level:
              type: string
              enum: [low, medium, high, critical]
        action_items:
          type: array
          items:
            type: object
            properties:
              action:
                type: string
              priority:
                type: string
                enum: [immediate, high, medium, low]
              estimated_effort:
                type: string
                enum: [low, medium, high]
              expected_outcome:
                type: string
        resource_recommendations:
          type: array
          items:
            type: object
            properties:
              resource_type:
                type: string
                enum: [person, tool, budget, training]
              description:
                type: string
              availability:
                type: string
        timeline_adjustments:
          type: object
          properties:
            recommended_extension:
              type: integer
              description: "Days to extend timeline"
            milestone_changes:
              type: array
              items:
                type: object
                properties:
                  milestone:
                    type: string
                  original_date:
                    type: string
                    format: date
                  recommended_date:
                    type: string
                    format: date
        alternative_approaches:
          type: array
          items:
            type: object
            properties:
              approach:
                type: string
              pros:
                type: array
                items:
                  type: string
              cons:
                type: array
                items:
                  type: string
              feasibility:
                type: string
                enum: [high, medium, low]

    # ==================== GOAL SCHEMAS ====================
    Goal:
      type: object
      required:
        - _id
        - title
        - objective_id
        - assigned_to
        - period_type
        - target_date
      properties:
        _id:
          type: string
          format: objectId
          example: "507f1f77bcf86cd799439016"
        title:
          type: string
          maxLength: 200
          example: "Complete customer survey analysis"
        description:
          type: string
          maxLength: 1000
        objective_id:
          type: string
          format: objectId
          description: "Linked OKR objective"
        objective:
          $ref: '#/components/schemas/ObjectiveSummary'
        key_result_id:
          type: string
          format: objectId
          description: "Specific key result this goal contributes to"
        assigned_to:
          type: string
          format: objectId
          description: "User ID of goal owner"
        assigned_user:
          $ref: '#/components/schemas/UserSummary'
        period_type:
          type: string
          enum: [weekly, monthly, quarterly]
          example: "monthly"
        target_date:
          type: string
          format: date
        actual_completion_date:
          type: string
          format: date
        status:
          type: string
          enum: [pending, in_progress, completed, overdue]
          default: pending
        priority:
          type: string
          enum: [low, medium, high, critical]
          default: medium
        progress_percentage:
          type: integer
          minimum: 0
          maximum: 100
          default: 0
        success_criteria:
          type: array
          items:
            type: string
        notes:
          type: string
          maxLength: 2000
        task_count:
          type: integer
          readOnly: true
          description: "Number of linked tasks"
        completed_task_count:
          type: integer
          readOnly: true
        created_by:
          type: string
          format: objectId
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    GoalDetail:
      allOf:
        - $ref: '#/components/schemas/Goal'
        - type: object
          properties:
            tasks:
              type: array
              items:
                $ref: '#/components/schemas/TaskSummary'
            activity_log:
              type: array
              items:
                $ref: '#/components/schemas/ActivityLogEntry'
            comments:
              type: array
              items:
                $ref: '#/components/schemas/Comment'

    GoalSummary:
      type: object
      properties:
        _id:
          type: string
          format: objectId
        title:
          type: string
        status:
          type: string
          enum: [pending, in_progress, completed, overdue]
        priority:
          type: string
          enum: [low, medium, high, critical]
        target_date:
          type: string
          format: date
        progress_percentage:
          type: integer

    GoalSuggestion:
      type: object
      properties:
        title:
          type: string
          example: "Analyze Q1 customer feedback"
        description:
          type: string
        rationale:
          type: string
          example: "This goal will contribute 20% toward the key result"
        period_type:
          type: string
          enum: [weekly, monthly, quarterly]
        estimated_effort:
          type: string
          enum: [low, medium, high]
        priority:
          type: string
          enum: [low, medium, high, critical]
        suggested_target_date:
          type: string
          format: date
        success_criteria:
          type: array
          items:
            type: string
        dependencies:
          type: array
          items:
            type: string

    # ==================== SUPPORTING SCHEMAS ====================
    ActivityLogEntry:
      type: object
      properties:
        _id:
          type: string
          format: objectId
        timestamp:
          type: string
          format: date-time
        user_id:
          type: string
          format: objectId
        user:
          $ref: '#/components/schemas/UserSummary'
        action:
          type: string
          enum: [created, updated, deleted, commented, status_changed, progress_updated]
        entity_type:
          type: string
          enum: [objective, key_result, goal, task]
        entity_id:
          type: string
          format: objectId
        details:
          type: object
          additionalProperties: true
        description:
          type: string

    Comment:
      type: object
      properties:
        _id:
          type: string
          format: objectId
        user_id:
          type: string
          format: objectId
        user:
          $ref: '#/components/schemas/UserSummary'
        text:
          type: string
          maxLength: 2000
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        edited:
          type: boolean
          default: false

    TaskSummary:
      type: object
      properties:
        _id:
          type: string
          format: objectId
        title:
          type: string
        status:
          type: string
          enum: [todo, in_progress, done]
        priority:
          type: string
          enum: [low, medium, high]
        due_date:
          type: string
          format: date
        assigned_to:
          type: string
          format: objectId