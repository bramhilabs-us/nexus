<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
    <defs>
        <linearGradient id="navyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#1e3a5f"/>
            <stop offset="100%" style="stop-color:#2d5a87"/>
        </linearGradient>
        <linearGradient id="flameGrad" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" style="stop-color:#d4a853"/>
            <stop offset="100%" style="stop-color:#f0c66e"/>
        </linearGradient>
    </defs>

    <!-- Anvil Shape -->
    <g transform="translate(4, 6)">
        <!-- Anvil base -->
        <path d="M10 38 L14 30 L26 30 L30 38 L10 38 Z" fill="url(#navyGrad)"/>
        <!-- Anvil top surface -->
        <path d="M8 30 L12 22 L28 22 L32 30 L8 30 Z" fill="url(#navyGrad)"/>
        <!-- Anvil horn (left) -->
        <path d="M2 26 L12 24 L12 28 L2 26 Z" fill="url(#navyGrad)"/>
        <!-- Anvil tail (right) -->
        <path d="M28 24 L28 28 L36 26 Z" fill="url(#navyGrad)"/>

        <!-- Flame/Spark above anvil -->
        <path d="M20 2 L22 10 L26 6 L24 14 L28 12 L22 20 L20 16 L18 20 L12 12 L16 14 L14 6 L18 10 L20 2 Z" fill="url(#flameGrad)"/>

        <!-- Center spark -->
        <circle cx="20" cy="11" r="2" fill="#ffffff" opacity="0.8"/>

        <!-- Small sparks -->
        <circle cx="8" cy="8" r="1.5" fill="#d4a853"/>
        <circle cx="32" cy="10" r="1.2" fill="#d4a853"/>
        <circle cx="6" cy="16" r="1" fill="#d4a853"/>
    </g>
</svg>
